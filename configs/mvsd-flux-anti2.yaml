name: "mvsd-flux-anti2"
tag: "${rmspace:${system.prompt_processor.prompt},_}"
exp_root_dir: "outputs"
seed: 0

data_type: "random-camera-datamodule"
data:
  batch_size: 2
  width: 512
  height: 512
  camera_distance_range: [1.5, 2.0]
  fovy_range: [40, 70]
  elevation_range: [-10, 45]
  light_sample_strategy: "dreamfusion"
  eval_camera_distance: 2.0
  eval_fovy_deg: 70.
  antithetic_pairs: true

system_type: "mvsd-system"
system:
  num_views: 2

  geometry_type: "implicit-volume"
  geometry:
    radius: 2.0
    normal_type: "analytic"

    density_bias: "blob_magic3d"
    density_activation: softplus
    density_blob_scale: 10.
    density_blob_std: 0.5

    pos_encoding_config:
      otype: ProgressiveBandHashGrid
      n_levels: 16
      n_features_per_level: 2
      log2_hashmap_size: 19
      base_resolution: 16
      per_level_scale: 1.447269237440378
      start_level: 8
      start_step: 800
      update_steps: 250

  material_type: "diffuse-with-point-light-material"
  material:
    ambient_only_steps: 400
    albedo_activation: sigmoid
    diffuse_prob: 0.3
    textureless_prob: 0.75
    ambient_only_on_test: true

  background_type: "neural-environment-map-background"
  background:
    color_activation: sigmoid

  renderer_type: "nerf-volume-renderer"
  renderer:
    radius: ${system.geometry.radius}
    num_samples_per_ray: 512
    return_comp_normal: true

  prompt_processor_type: "flux-prompt-processor"
  prompt_processor:
    pretrained_model_name_or_path: "black-forest-labs/FLUX.1-dev"
    prompt: ???
    max_sequence_length: 256

  guidance_type: "flux-sdi-guidance"
  guidance:
    pretrained_model_name_or_path: "black-forest-labs/FLUX.1-dev"
    half_precision_weights: true
    latent_size: 64
    guidance_scale: 3.5            # FLUX-dev distilled embed (training default)
    min_step_percent: 0.20
    max_step_percent: 0.95
    trainer_max_steps: 2000
    t_anneal: true

    # Classical CFG (two forward passes, combined externally). See
    # paper/FLUX_INTEGRATION_NOTES.md for why distilled-only fails.
    use_classical_cfg: true
    cfg_scale: 30.0                # SDS regime
    inversion_cfg_scale: -7.5      # anti-prompt during inversion

    enable_sdi: true
    inversion_guidance_scale: 1.0  # distilled neutral during inversion
    inversion_n_steps: 8
    inversion_eta: 0.0

    enable_memory_efficient_attention: true

  loggers:
    wandb:
      enable: false
      project: "threestudio"
      name: None

  loss:
    lambda_sdi: 1.
    lambda_orient: 0.1
    lambda_sparsity: [0,0.15,0.,1200]
    lambda_opaque: 0.1
    lambda_convex: [0,1.,0.1,1600]
    lambda_z_variance: 1.

  optimizer:
    name: Adam
    args:
      lr: 0.01
      betas: [0.9, 0.99]
      eps: 1.e-15
    params:
      geometry:
        lr: 0.01
      background:
        lr: 0.001

trainer:
  max_steps: 2000
  log_every_n_steps: 1
  num_sanity_val_steps: 0
  val_check_interval: 200
  enable_progress_bar: true
  precision: bf16-mixed

checkpoint:
  save_last: true
  save_top_k: -1
  every_n_train_steps: ${trainer.max_steps}
